<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aquí encuentras los videos más calientes 🔥</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:'Poppins',sans-serif;
      background:#0f1117;
      color:#fff;
    }

    .online-bar {
      background: linear-gradient(90deg, #1a1f2e, #2a1f35);
      border-top: 3px solid #ff0055;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 18px;
      font-weight: 600;
    }

    .avatars img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 3px solid #0f1117;
      margin-left: -18px;
      box-shadow: 0 0 0 2px #ff0055;
    }

    .live-info {
      background: rgba(0, 255, 100, 0.15);
      color: #00ff85;
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid #00ff85;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
    }

    .live-dot {
      width: 15px;
      height: 15px;
      background: #00ff85;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.7); }
      70% { box-shadow: 0 0 0 12px rgba(0, 255, 133, 0); }
    }

    /* Otros estilos... (puedes pegar el resto de tu CSS aquí) */
  </style>
</head>
<body>

  <!-- ... Tu Hero y secciones ... -->

  <!-- BARRA DE USUARIOS EN LÍNEA -->
  <div class="online-bar">
    <span>👥 Ahora mismo en línea</span>
    
    <div class="avatars">
      <img src="https://i.pravatar.cc/150?img=1" alt="">
      <img src="https://i.pravatar.cc/150?img=2" alt="">
      <img src="https://i.pravatar.cc/150?img=3" alt="">
      <img src="https://i.pravatar.cc/150?img=4" alt="">
    </div>

    <div class="live-info">
      <div class="live-dot"></div>
      <strong id="online-count">2,847</strong>
      <span>conectados 🔥</span>
    </div>
  </div>

  <script>
    // ==================== CONTADOR EN LÍNEA (SIMULADO + REAL) ====================
    let online = 2847;

    function updateOnlineCount() {
      // Pequeña variación aleatoria para que se sienta "vivo"
      const variation = Math.floor(Math.random() * 7) - 3; // entre -3 y +3
      online = Math.max(2100, online + variation);
      
      document.getElementById('online-count').textContent = 
        online.toLocaleString('es-ES');
    }

    // Actualizar cada 4-8 segundos
    setInterval(updateOnlineCount, 4500);

    // Contador de visitas totales con CountAPI (real)
    fetch('https://api.countapi.xyz/hit/inmormusic/eljuaafiltrados')
      .then(res => res.json())
      .then(data => {
        console.log('Visitas totales:', data.value);
        // Puedes mostrarlo en algún lugar si quieres
      })
      .catch(() => {});
  </script>

</body>
</html>
